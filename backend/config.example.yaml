# 系统配置示例
# 复制此文件为 src/config.yaml 并填入你的配置

# LLM 配置
llm:
  provider: "openai"        # openai, anthropic
  api_key: "your-api-key-here"
  model: "gpt-3.5-turbo"
  base_url: ""              # 可选，自定义 API 地址（如代理或本地服务）
  temperature: 0.7
  max_tokens: 4096

# 记忆系统配置
memory:
  backend: "memory"          # "memory" (内存) 或 "chroma" (ChromaDB 持久化)
  persist_dir: "./data/chroma"
  collection_name: "agent_memories"

# 消息总线配置
bus:
  queue_size: 1000           # 消息队列大小，0 为无限
  history_size: 500          # 消息历史保留数量

# 上下文管理配置
context:
  persist_dir: "./data/context"  # 项目上下文持久化目录

# 工作流配置
pipeline:
  max_iterations: 10         # 全局最大迭代次数
  default_timeout: 300.0     # 默认超时（秒）

# 智能体配置
agents:
  - name: "planner"
    type: "builtin.PlannerAgent"
    description: "任务规划智能体"
    capabilities:
      - "task_decomposition"
      - "dependency_analysis"
    config:
      max_subtasks: 10

  - name: "coder"
    type: "builtin.CoderAgent"
    description: "代码生成智能体"
    capabilities:
      - "code_generation"
      - "code_refactoring"

  - name: "reviewer"
    type: "builtin.ReviewerAgent"
    description: "代码审查智能体"
    capabilities:
      - "code_review"
      - "quality_check"
