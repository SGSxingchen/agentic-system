capabilities:
  # 原生插件
  - name: "code_parser"
    type: "native"
    class: "core.capability.native.CodeParserCapability"
    description: "解析 Python 代码生成 AST 信息（函数/类/导入列表）"

  - name: "static_analyzer"
    type: "native"
    class: "core.capability.native.StaticAnalyzerCapability"
    description: "基本代码质量检查（行长/函数长度/未使用导入）"

