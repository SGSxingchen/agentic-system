system:
  name: "Multi-Agent Code System"
  version: "0.2.0"
  debug: false

bus:
  queue_size: 10000
  history_size: 100

memory:
  backend: "memory"  # "memory" 或 "chroma"
  # persist_dir: "./data/chroma"
  # collection_name: "agent_memories"

logging:
  level: "INFO"
  format: "console"  # "json" 或 "console"

server:
  host: "127.0.0.1"
  port: 8001
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
