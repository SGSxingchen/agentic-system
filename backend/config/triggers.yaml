triggers:
  # 用户消息 → 助手处理
  - id: "user_to_assistant"
    event: "user_message"
    agent: "assistant"
    priority: 0

  # 规划请求 → 规划器
  - id: "plan_request_to_planner"
    event: "plan_request"
    agent: "planner"
    priority: 0

  # 规划完成 → 编码器
  - id: "plan_to_coder"
    event: "plan_created"
    agent: "coder"
    priority: 1

  # 代码生成 → 审查器
  - id: "code_to_reviewer"
    event: "code_generated"
    agent: "reviewer"
    priority: 1

  # 审查失败且严重度高 → 编码器修复
  - id: "review_fail_to_coder"
    event: "review_failed"
    agent: "coder"
    priority: 2
    condition: "data.get('severity', 0) > 5"
