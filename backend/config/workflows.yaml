workflows:
  code_generation_and_review:
    description: "代码生成与审查流水线"
    mode: "sequential"
    steps:
      - name: "plan"
        agent: "planner"
        input: "${user_requirement}"
        output: "plan"

      - name: "code"
        agent: "coder"
        input: "${plan}"
        output: "code"

      - name: "review"
        agent: "reviewer"
        input: "${code}"
        output: "review_result"

      - name: "fix"
        agent: "coder"
        condition: "review_result.get('approved') == False"
        input: "${review_result}"
        output: "fixed_code"
        max_iterations: 3

  quick_code:
    description: "快速代码生成（跳过规划）"
    mode: "sequential"
    steps:
      - name: "code"
        agent: "coder"
        input: "${user_requirement}"
        output: "code"

      - name: "review"
        agent: "reviewer"
        input: "${code}"
        output: "review_result"

  parallel_review:
    description: "并行审查（代码+安全同时检查）"
    mode: "parallel"
    steps:
      - name: "code_review"
        agent: "reviewer"
        input: "${code}"
        output: "code_review_result"

      - name: "security_review"
        agent: "reviewer"
        input: "${code}"
        output: "security_review_result"
